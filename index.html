<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Electronics | Static Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo"><a href="info.html"><img src="Smart.png" width="270px"></a></div>
            <div class="search-bar">
                <input type="text" placeholder="Пошук товарів...">
            </div>
            <div class="cart-preview">
                <span class="icon"><a href="cart.html">🛒</span> Кошик</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Найкращі  електронні <span>пристрої</span></h1>
        </div>
    </header>

    <main class="container">
        <section class="section-title">
            <h2>Наші товари</h2>
            <div class="line"></div>
        </section>

        <div class="grid">
            <div class="card">
                <span class="img-placeholder">
                    <img src="https://tvoygadget.com.ua/wp-content/uploads/2023/09/apple-iphone-15-512-gb-black_1.png" class="product_img">
                </span>
                <h3>iPhone 15 Ultra</h3>
                <div class="card-footer-row">
                    <span class="price">24,640  ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>

            <div class="card">
                <span class="img-placeholder">
                    <img src="https://pc.com.ua/tmp/images/products/13618/img-1668-590x690-f.webp" alt="" class="product_img">
                </span>
                <h3>MacBook Pro M3</h3>
                <div class="card-footer-row">
                    <span class="price">92,000 ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>

            <div class="card">
                <span class="img-placeholder"><img src="https://content2.rozetka.com.ua/goods/images/big/594858183.jpg" alt="" class="product_img"></span>
                <h3>Apple Watch X</h3>
                <div class="card-footer-row">
                    <span class="price">14,200 ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>
            <div class="card">
                <span class="img-placeholder"><img src="https://timesport.com.ua/content/images/28/456x456l80mc0/44878265828109.webp" alt="" class="product_img"></span>
                <h3>K-85XR90</h3>
                <div class="card-footer-row">
                    <span class="price">196,172 ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>
            <div class="card">
                <span class="img-placeholder"><img src="https://content2.rozetka.com.ua/goods/images/big/392132677.jpg" class="product_img"></span>
                <h3>Sony PlayStation 5</h3>
                <div class="card-footer-row">
                    <span class="price">25,999 ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>

            <div class="card">
                <span class="img-placeholder"><img src="https://era-in-ear.com/wp-content/uploads/2022/05/sony-wh-1000xm5-1.jpg" class="product_img"></span>
                <h3>Sony WH-1000XM5</h3>
                <div class="card-footer-row">
                    <span class="price">13,999 ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>
        </div>
    </main>
    <div class="grid">
            <div class="card">
                <span class="img-placeholder">
                    <img src="https://tvoygadget.com.ua/wp-content/uploads/2023/09/apple-iphone-15-512-gb-black_1.png" class="product_img">
                </span>
                <h3>iPhone 15 Ultra</h3>
                <div class="card-footer-row">
                    <span class="price">24,640  ₴</span>
                    <button class="btn-buy">Купити</button>
                </div>
            </div>

    <footer class="simple-footer">
        <div class="container">
            <p>&copy; 2026 Smart Electronics. Всі права захищено.</p>
        </div>
    </footer>
</body>
</html>
